<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimentação de Ativos - Tablet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .focus-ring:focus { outline: none; box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.4); border-color: #a855f7; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-6">
        <div class="mb-8 border-b pb-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Movimentação de Ativos</h1>
                <p class="text-sm text-gray-500 mt-1">Bipagem rápida otimizada para tablets</p>
            </div>
            <a href="{% url 'inventario:lista_ativos' %}" class="text-purple-600 hover:text-purple-800 text-sm font-medium">Voltar ao Inventário</a>
        </div>

        <!-- Passo 1: Cabeçalho da Movimentação -->
        <div id="step-1" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Cliente</label>
                    <select id="cliente_id" class="w-full border border-gray-300 rounded-lg p-3 focus-ring">
                        <option value="">Selecione um cliente...</option>
                        {% for cliente in clientes %}
                        <option value="{{ cliente.pk }}">{{ cliente.nome_fantasia }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de Movimentação</label>
                    <select id="tipo_movimentacao" class="w-full border border-gray-300 rounded-lg p-3 focus-ring">
                        <option value="">Selecione o tipo...</option>
                        {% for value, label in tipos_movimentacao %}
                        <option value="{{ value }}">{{ label }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Observações (Opcional)</label>
                <input type="text" id="observacoes" class="w-full border border-gray-300 rounded-lg p-3 focus-ring" placeholder="Notas sobre a movimentação...">
            </div>
            <div class="flex justify-end pt-4">
                <button id="btn-iniciar" onclick="iniciarMovimentacao()" class="bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 px-6 rounded-lg shadow-md transition-colors w-full md:w-auto">
                    Iniciar Bipagem
                </button>
            </div>
        </div>

        <!-- Passo 2: Bipagem -->
        <div id="step-2" class="hidden mt-6 border-t pt-6">
            <div class="bg-purple-50 p-4 rounded-lg border border-purple-100 mb-6 flex items-center gap-4">
                <div class="flex-1">
                    <label class="block text-xs font-semibold text-purple-700 uppercase mb-1" id="label_bipagem">Número de Série (S/N)</label>
                    <input type="text" id="input_bipagem" class="w-full border-2 border-purple-300 rounded-lg p-4 text-lg focus-ring font-mono" placeholder="Bipe o código de barras ou digite e aperte ENTER..." autocomplete="off">
                </div>
                
                <!-- Input extra para o ativo substituto no caso de TROCA -->
                <div class="flex-1 hidden" id="div_bipagem_substituto">
                    <label class="block text-xs font-semibold text-blue-700 uppercase mb-1">Ativo Substituto (NOVO)</label>
                    <input type="text" id="input_bipagem_substituto" class="w-full border-2 border-blue-300 rounded-lg p-4 text-lg focus-ring font-mono" placeholder="Bipe o NOVO equipamento..." autocomplete="off">
                </div>

                <div class="pt-5">
                    <button id="btn-add" onclick="biparAtivo()" class="bg-gray-800 hover:bg-gray-900 text-white font-semibold py-4 px-6 rounded-lg transition-colors">
                        Adicionar
                    </button>
                </div>
            </div>

            <div id="alerta_erro" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4" role="alert">
                <strong class="font-bold">Erro!</strong>
                <span class="block sm:inline" id="alerta_erro_msg"></span>
            </div>

            <h3 class="text-lg font-semibold text-gray-800 mb-3 flex justify-between">
                Itens na Movimentação
                <span id="contador_itens" class="bg-purple-100 text-purple-800 text-sm py-1 px-3 rounded-full">0 itens</span>
            </h3>
            
            <div class="overflow-x-auto border rounded-lg mb-6">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="p-3 text-sm font-semibold text-gray-600">S/N Principal</th>
                            <th class="p-3 text-sm font-semibold text-gray-600">Modelo</th>
                            <th class="p-3 text-sm font-semibold text-gray-600">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabela_itens" class="divide-y text-gray-700">
                        <!-- Itens adicionados via JS -->
                    </tbody>
                </table>
            </div>

            <!-- Seção de Acessórios (sem serial) -->
            <div class="bg-blue-50 p-4 rounded-lg border border-blue-100 mb-6">
                <h4 class="text-sm font-bold text-blue-800 uppercase mb-3">Acessórios / Itens de Lote (sem serial)</h4>
                <div class="flex items-end gap-3">
                    <div class="flex-1 relative">
                        <label class="block text-xs font-semibold text-blue-700 mb-1">Buscar Acessório</label>
                        <input type="text" id="input_busca_acessorio" class="w-full border-2 border-blue-300 rounded-lg p-3 text-sm focus-ring" placeholder="Digite o nome (ex: Capa C6000)..." autocomplete="off">
                        <div id="autocomplete_dropdown" class="absolute z-10 w-full bg-white border border-gray-300 rounded-lg shadow-lg mt-1 hidden max-h-48 overflow-y-auto"></div>
                    </div>
                    <div class="w-24">
                        <label class="block text-xs font-semibold text-blue-700 mb-1">Qtd</label>
                        <input type="number" id="input_qtd_acessorio" class="w-full border-2 border-blue-300 rounded-lg p-3 text-sm text-center focus-ring" min="1" value="1" disabled>
                    </div>
                    <div class="pb-0.5">
                        <button id="btn-add-acessorio" onclick="adicionarAcessorio()" class="bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3 px-5 rounded-lg transition-colors" disabled>
                            + Adicionar
                        </button>
                    </div>
                </div>
            </div>

            <div id="tabela_acessorios_wrapper" class="hidden overflow-x-auto border rounded-lg mb-6">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-blue-50 border-b">
                        <tr>
                            <th class="p-3 text-sm font-semibold text-blue-700">Acessório</th>
                            <th class="p-3 text-sm font-semibold text-blue-700 text-center">Qtd</th>
                            <th class="p-3 text-sm font-semibold text-blue-700 text-center">Estoque Disp.</th>
                            <th class="p-3 text-sm font-semibold text-blue-700">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabela_acessorios" class="divide-y text-gray-700">
                    </tbody>
                </table>
            </div>

            <div class="flex justify-end pt-4 border-t gap-3">
                <button onclick="cancelarMovimentacao()" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-3 px-6 rounded-lg transition-colors">
                    Cancelar
                </button>
                <button onclick="finalizarMovimentacao()" class="bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-8 rounded-lg shadow-md transition-colors flex items-center gap-2">
                    <span>Finalizar e Gerar Cautela</span>
                    <svg class="w-5 h-5 hidden animate-spin" id="spinner-finalizar" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>
        </div>

    </div>

    <!-- CSRF Token para AJAX -->
    <script>
        const getCookie = (name) => {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        };
        const csrftoken = getCookie('csrftoken');
    </script>

    <script>
        let lote = [];
        let loteAcessorios = [];
        let acessorioSelecionado = null;
        let isTroca = false;

        function iniciarMovimentacao() {
            const cliente = document.getElementById('cliente_id').value;
            const tipo = document.getElementById('tipo_movimentacao').value;

            if(!cliente || !tipo) {
                alert("Selecione o Cliente e o Tipo de Movimentação.");
                return;
            }

            document.getElementById('cliente_id').disabled = true;
            document.getElementById('tipo_movimentacao').disabled = true;
            document.getElementById('observacoes').disabled = true;
            document.getElementById('btn-iniciar').disabled = true;
            document.getElementById('btn-iniciar').classList.add('opacity-50');

            isTroca = (tipo === 'TROCA');
            
            document.getElementById('step-2').classList.remove('hidden');
            
            if(isTroca) {
                document.getElementById('label_bipagem').innerText = 'Ativo DEFEITUOSO (S/N)';
                document.getElementById('div_bipagem_substituto').classList.remove('hidden');
            } else {
                document.getElementById('label_bipagem').innerText = 'Número de Série (S/N)';
                document.getElementById('div_bipagem_substituto').classList.add('hidden');
            }

            document.getElementById('input_bipagem').focus();
        }

        function cancelarMovimentacao() {
            if(confirm("Tem certeza que deseja cancelar? Todos os itens bipados serão perdidos.")) {
                window.location.reload();
            }
        }

        // Bipar com ENTER no primeiro input
        document.getElementById('input_bipagem').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                if(isTroca) {
                    document.getElementById('input_bipagem_substituto').focus();
                } else {
                    biparAtivo();
                }
            }
        });

        // Bipar com ENTER no segundo input (Swap)
        document.getElementById('input_bipagem_substituto').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                biparAtivo();
            }
        });

        async function biparAtivo() {
            const sn = document.getElementById('input_bipagem').value.trim();
            const tipo = document.getElementById('tipo_movimentacao').value;
            const erroEl = document.getElementById('alerta_erro');
            const erroMsg = document.getElementById('alerta_erro_msg');
            
            erroEl.classList.add('hidden');

            if (!sn) return;

            // Se for troca, precisamos validar dois
            let snSubstituto = null;
            if(isTroca) {
                snSubstituto = document.getElementById('input_bipagem_substituto').value.trim();
                if(!snSubstituto) {
                    erroMsg.innerText = "Para TROCA, bipe também o Ativo Substituto.";
                    erroEl.classList.remove('hidden');
                    return;
                }
            }

            if(lote.find(i => i.numero_serie === sn)) {
                erroMsg.innerText = "Este ativo já está na lista.";
                erroEl.classList.remove('hidden');
                document.getElementById('input_bipagem').value = '';
                return;
            }

            document.getElementById('btn-add').disabled = true;

            try {
                // Valida o ativo principal (DEVOLUCAO)
                let tipoValidar = isTroca ? 'DEVOLUCAO' : tipo;
                const resp1 = await fetch(`{% url 'inventario:validar_ativo_bipagem' %}?numero_serie=${sn}&tipo=${tipoValidar}`);
                const data1 = await resp1.json();

                if (!data1.ok) {
                    erroMsg.innerText = data1.erro;
                    erroEl.classList.remove('hidden');
                } else {
                    let ativoModelInfo = data1.modelo;

                    // Se for troca, valida o substituto (ALOCACAO)
                    if(isTroca) {
                        const resp2 = await fetch(`{% url 'inventario:validar_ativo_bipagem' %}?numero_serie=${snSubstituto}&tipo=ALOCACAO`);
                        const data2 = await resp2.json();
                        if(!data2.ok) {
                            erroMsg.innerText = "Erro no Substituto: " + data2.erro;
                            erroEl.classList.remove('hidden');
                            document.getElementById('btn-add').disabled = false;
                            return;
                        }
                        ativoModelInfo += ` <br><span class='text-xs text-blue-600'>Substituto: ${data2.modelo} (S/N ${snSubstituto})</span>`;
                    }

                    // Sucesso! Adiciona no lote
                    lote.push({
                        numero_serie: sn,
                        numero_serie_substituto: snSubstituto,
                        modelo: ativoModelInfo
                    });

                    atualizarTabela();
                    document.getElementById('input_bipagem').value = '';
                    if(isTroca) document.getElementById('input_bipagem_substituto').value = '';
                    document.getElementById('input_bipagem').focus();
                }
            } catch (err) {
                erroMsg.innerText = "Erro de conexão ao validar o ativo.";
                erroEl.classList.remove('hidden');
            }

            document.getElementById('btn-add').disabled = false;
        }

        function removerAtivo(index) {
            lote.splice(index, 1);
            atualizarTabela();
        }

        function atualizarTabela() {
            const tbody = document.getElementById('tabela_itens');
            tbody.innerHTML = '';
            
            lote.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-3 font-mono font-medium">${item.numero_serie}</td>
                    <td class="p-3">${item.modelo}</td>
                    <td class="p-3">
                        <button onclick="removerAtivo(${index})" class="text-red-500 hover:text-red-700 font-semibold text-sm">Remover</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            const totalItens = lote.length + loteAcessorios.reduce((s, a) => s + a.quantidade, 0);
            document.getElementById('contador_itens').innerText = `${totalItens} itens`;
        }

        // ======== ACESSÓRIOS (Autocomplete + Quantidade) ========

        let debounceTimer = null;
        const inputBusca = document.getElementById('input_busca_acessorio');
        const dropdown = document.getElementById('autocomplete_dropdown');

        inputBusca.addEventListener('input', function() {
            clearTimeout(debounceTimer);
            const q = this.value.trim();
            acessorioSelecionado = null;
            document.getElementById('input_qtd_acessorio').disabled = true;
            document.getElementById('btn-add-acessorio').disabled = true;

            if(q.length < 2) {
                dropdown.classList.add('hidden');
                return;
            }

            debounceTimer = setTimeout(async () => {
                try {
                    const resp = await fetch(`{% url 'inventario:buscar_acessorios' %}?q=${encodeURIComponent(q)}`);
                    const data = await resp.json();
                    renderDropdown(data.resultados);
                } catch(e) {
                    dropdown.classList.add('hidden');
                }
            }, 300);
        });

        function renderDropdown(resultados) {
            dropdown.innerHTML = '';
            if(resultados.length === 0) {
                dropdown.innerHTML = '<div class="p-3 text-sm text-gray-500">Nenhum acessório encontrado.</div>';
                dropdown.classList.remove('hidden');
                return;
            }
            resultados.forEach(item => {
                const div = document.createElement('div');
                div.className = 'p-3 hover:bg-blue-50 cursor-pointer border-b border-gray-100 text-sm';
                div.innerHTML = `<strong>${item.nome}</strong> <span class="text-gray-500">(${item.categoria})</span> <span class="text-blue-600 text-xs ml-2">Estoque: ${item.estoque_disponivel}</span>`;
                div.addEventListener('click', () => selecionarAcessorio(item));
                dropdown.appendChild(div);
            });
            dropdown.classList.remove('hidden');
        }

        function selecionarAcessorio(item) {
            acessorioSelecionado = item;
            inputBusca.value = item.nome;
            dropdown.classList.add('hidden');
            const inputQtd = document.getElementById('input_qtd_acessorio');
            inputQtd.disabled = false;
            inputQtd.max = item.estoque_disponivel;
            inputQtd.value = 1;
            document.getElementById('btn-add-acessorio').disabled = false;
            inputQtd.focus();
        }

        // Fecha o dropdown se clicar fora
        document.addEventListener('click', function(e) {
            if(!e.target.closest('#input_busca_acessorio') && !e.target.closest('#autocomplete_dropdown')) {
                dropdown.classList.add('hidden');
            }
        });

        function adicionarAcessorio() {
            if(!acessorioSelecionado) return;
            const qtd = parseInt(document.getElementById('input_qtd_acessorio').value) || 0;
            if(qtd <= 0) { alert('Quantidade inválida.'); return; }
            if(qtd > acessorioSelecionado.estoque_disponivel) {
                alert(`Estoque insuficiente. Disponível: ${acessorioSelecionado.estoque_disponivel}`);
                return;
            }

            // Verifica se já existe no lote
            const existente = loteAcessorios.find(a => a.ativo_id === acessorioSelecionado.id);
            if(existente) {
                existente.quantidade += qtd;
            } else {
                loteAcessorios.push({
                    ativo_id: acessorioSelecionado.id,
                    nome: acessorioSelecionado.nome,
                    categoria: acessorioSelecionado.categoria,
                    quantidade: qtd,
                    estoque_disponivel: acessorioSelecionado.estoque_disponivel
                });
            }

            atualizarTabelaAcessorios();
            atualizarTabela(); // Atualiza contador geral

            // Limpa inputs
            inputBusca.value = '';
            document.getElementById('input_qtd_acessorio').value = 1;
            document.getElementById('input_qtd_acessorio').disabled = true;
            document.getElementById('btn-add-acessorio').disabled = true;
            acessorioSelecionado = null;
            inputBusca.focus();
        }

        function removerAcessorio(index) {
            loteAcessorios.splice(index, 1);
            atualizarTabelaAcessorios();
            atualizarTabela();
        }

        function atualizarTabelaAcessorios() {
            const tbody = document.getElementById('tabela_acessorios');
            const wrapper = document.getElementById('tabela_acessorios_wrapper');
            tbody.innerHTML = '';

            if(loteAcessorios.length === 0) {
                wrapper.classList.add('hidden');
                return;
            }
            wrapper.classList.remove('hidden');

            loteAcessorios.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="p-3 font-medium">${item.nome} <span class="text-xs text-gray-500">(${item.categoria})</span></td>
                    <td class="p-3 text-center font-bold">${item.quantidade}</td>
                    <td class="p-3 text-center text-sm text-gray-500">${item.estoque_disponivel}</td>
                    <td class="p-3">
                        <button onclick="removerAcessorio(${index})" class="text-red-500 hover:text-red-700 font-semibold text-sm">Remover</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function finalizarMovimentacao() {
            if(lote.length === 0 && loteAcessorios.length === 0) {
                alert("Adicione pelo menos um ativo ou acessório na movimentação.");
                return;
            }

            const spinner = document.getElementById('spinner-finalizar');
            spinner.classList.remove('hidden');

            const payload = {
                cliente_id: document.getElementById('cliente_id').value,
                tipo: document.getElementById('tipo_movimentacao').value,
                observacoes: document.getElementById('observacoes').value,
                itens: lote,
                acessorios: loteAcessorios
            };

            try {
                const resp = await fetch("{% url 'inventario:processar_lote_movimentacao' %}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrftoken
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await resp.json();
                if(data.ok) {
                    alert(data.mensagem);
                    if(data.pdf_url) {
                        window.open(data.pdf_url, '_blank');
                    }
                    window.location.href = "{% url 'inventario:lista_movimentacoes' %}";
                } else {
                    alert("Erro: " + data.erro);
                }
            } catch (e) {
                alert("Erro ao processar movimentação.");
            } finally {
                spinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
