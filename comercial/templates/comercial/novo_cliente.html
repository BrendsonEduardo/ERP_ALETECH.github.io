<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Cliente - AleTech</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 m-0 p-0">

    {% include "partials/sidebar.html" %}

    <div class="lg:ml-64 min-h-screen p-6 transition-all duration-300">
        
        <div class="mb-6 mt-12 lg:mt-0 flex items-center justify-between">
            <div>
                <a href="{% url 'painel_comercial' %}" class="text-sm text-blue-600 hover:underline">← Voltar ao Painel</a>
                <h1 class="text-2xl font-bold tracking-tight text-gray-900 mt-1">Cadastrar Novo Cliente</h1>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 max-w-3xl">
            <form action="{% url 'novo_cliente' %}" method="POST" enctype="multipart/form-data" id="formCliente" onsubmit="limparMascaraDocumento()">
                {% csrf_token %}

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    
                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Tipo de Cadastro</label>
                        <select name="tipo" id="tipoPessoa" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-blue-500 bg-white" onchange="ajustarFormularioPorTipo()">
                            <option value="PJ" selected>Pessoa Jurídica (Empresa)</option>
                            <option value="PF">Pessoa Física (Individual)</option>
                        </select>
                    </div>

                    <div>
                        <label id="labelNomeFantasia" class="block text-sm font-semibold text-gray-700 mb-1">Nome Fantasia *</label>
                        <input type="text" name="nome_fantasia" required class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-blue-500">
                    </div>

                    <div id="blocoRazaoSocial">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Razão Social</label>
                        <input type="text" name="razao_social" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-blue-500">
                    </div>

                    <div>
                        <label id="labelDocumento" class="block text-sm font-semibold text-gray-700 mb-1">CNPJ *</label>
                        <input type="text" name="cnpj_cpf" id="cnpj_cpf" required placeholder="00.000.000/0000-00" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-blue-500">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">E-mail de Contato *</label>
                        <input type="email" name="email" required placeholder="exemplo@empresa.com" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-blue-500">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Telefone / WhatsApp *</label>
                        <input type="text" name="telefone" required placeholder="(00) 00000-0000" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-blue-500">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Ficha Cadastral (PDF/Imagem)</label>
                        <input type="file" name="ficha_cadastral" accept=".pdf,image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Contato Responsável / Ponto de Contato</label>
                        <input type="text" name="contato_responsavel" placeholder="Ex: Rosângelo Sousa (Financeiro / TI)" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-blue-500">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Endereço Completo</label>
                        <textarea name="endereco" rows="2" placeholder="Rua, Número, Bairro, Cidade - UF" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:outline-blue-500"></textarea>
                    </div>

                </div>

                <div class="mt-6 pt-4 border-t border-gray-100 flex justify-end space-x-2">
                    <a href="{% url 'painel_comercial' %}" class="bg-gray-100 text-gray-700 px-4 py-2 rounded text-sm hover:bg-gray-200 font-medium">Cancelar</a>
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700 shadow font-semibold">Salvar e Avançar →</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Melhora a UX adaptando os labels conforme a escolha de PF ou PJ
        function ajustarFormularioPorTipo() {
            const tipo = document.getElementById('tipoPessoa').value;
            const labelNomeFantasia = document.getElementById('labelNomeFantasia');
            const blocoRazaoSocial = document.getElementById('blocoRazaoSocial');
            const labelDocumento = document.getElementById('labelDocumento');
            const inputDocumento = document.getElementById('cnpj_cpf');

            if (tipo === 'PF') {
                labelNomeFantasia.textContent = 'Nome Completo *';
                blocoRazaoSocial.style.display = 'none';
                labelDocumento.textContent = 'CPF *';
                inputDocumento.placeholder = '000.000.000-00';
            } else {
                labelNomeFantasia.textContent = 'Nome Fantasia *';
                blocoRazaoSocial.style.display = 'block';
                labelDocumento.textContent = 'CNPJ *';
                inputDocumento.placeholder = '00.000.000/0000-00';
            }
        }

        // INTEGRIDADE DE DADOS: Remove pontos, hífens e barras antes do envio para o Django
        function limparMascaraDocumento() {
            const inputDocumento = document.getElementById('cnpj_cpf');
            // Remove tudo que não for número antes do POST
            inputDocumento.value = inputDocumento.value.replace(/\D/g, '');
        }
    </script>
</body>
</html>
