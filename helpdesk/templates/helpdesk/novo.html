<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Chamado — AleTech</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
        body { background: #09090B; color: #E4E4F0; margin: 0; min-height: 100vh; }
        .nu-input { background: #1E1E28; border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; color: #E4E4F0; padding: 11px 14px; font-size: 14px; transition: all 0.2s; outline: none; width: 100%; }
        .nu-input:focus { border-color: rgba(138,5,190,0.6); box-shadow: 0 0 0 3px rgba(138,5,190,0.15); }
        .nu-input::placeholder { color: #52525B; }
        .nu-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #71717A; margin-bottom: 6px; }
        select.nu-input option { background: #18181F; }
        textarea.nu-input { resize: vertical; }
        @media (max-width: 1023px) { #app-sidebar { transform: translateX(-100%); } #main-content { margin-left: 0 !important; } }
    </style>
</head>
<body>

    {% include "partials/sidebar.html" %}

    <div id="main-content" style="margin-left: 256px; min-height: 100vh; padding: 40px 32px;">

        <!-- Back + Title -->
        <div style="margin-bottom: 28px;">
            <a href="{% url 'painel_helpdesk' %}"
               style="font-size: 12px; font-weight: 600; color: #71717A; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 10px; transition: color 0.15s;"
               onmouseover="this.style.color='#C084F5'" onmouseout="this.style.color='#71717A'">← Voltar ao Painel</a>
            <h1 style="font-size: 22px; font-weight: 800; color: #FAFAFA; letter-spacing: -0.3px; margin: 0;">Abrir Novo Chamado</h1>
            <p style="font-size: 13px; color: #71717A; margin: 4px 0 0;">Preencha os dados conforme diretriz POP-001</p>
        </div>

        <!-- Form -->
        <div style="max-width: 720px; background: #18181F; border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 32px;">
            <form action="{% url 'novo_chamado' %}" method="POST">
                {% csrf_token %}

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 18px;">

                    <div>
                        <label class="nu-label">Empresa / Cliente *</label>
                        <input type="text" name="empresa" class="nu-input" placeholder="Nome da empresa parceira" required>
                    </div>

                    <div>
                        <label class="nu-label">Solicitante *</label>
                        <input type="text" name="solicitante" class="nu-input" placeholder="Quem está pedindo o suporte?" required>
                    </div>

                    <div>
                        <label class="nu-label">Contato (WhatsApp / Telefone) *</label>
                        <input type="text" name="contato" class="nu-input" placeholder="(00) 00000-0000" required>
                    </div>

                    <div>
                        <label class="nu-label">Forma de Atendimento</label>
                        <select name="forma_atendimento" class="nu-input" style="cursor: pointer;">
                            <option value="Presencial">🚗 Presencial</option>
                            <option value="Remoto">💻 Remoto</option>
                        </select>
                    </div>

                    <div>
                        <label class="nu-label">Equipamento / Ativo *</label>
                        <input type="text" name="equipamento" class="nu-input" placeholder="Ex: Servidor, Notebook Dell" required>
                    </div>

                    <div>
                        <label class="nu-label">Grau de Prioridade</label>
                        <select name="prioridade" class="nu-input" required style="cursor: pointer;">
                            <option value="Baixa">🟢 Baixa</option>
                            <option value="Média" selected>🟡 Média</option>
                            <option value="Alta">🔴 Alta</option>
                        </select>
                    </div>

                    <div style="grid-column: 1 / -1;">
                        <label class="nu-label">Descrição do Problema *</label>
                        <textarea name="problema" rows="4" class="nu-input" required
                                  placeholder="Detalhe o erro ou solicitação com o máximo de informações possível conforme POP-001..."></textarea>
                    </div>

                </div>

                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 28px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.06);">
                    <a href="{% url 'painel_helpdesk' %}"
                       style="padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; color: #71717A; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); text-decoration: none;">
                        Cancelar
                    </a>
                    <button type="submit"
                            style="padding: 10px 24px; border-radius: 10px; font-size: 13px; font-weight: 800; color: white; background: linear-gradient(135deg, #8A05BE, #6B03A0); border: none; cursor: pointer; box-shadow: 0 4px 14px rgba(138,5,190,0.3); transition: all 0.2s;"
                            onmouseover="this.style.transform='translateY(-1px)'; this.style.boxShadow='0 6px 20px rgba(138,5,190,0.45)'"
                            onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 14px rgba(138,5,190,0.3)'">
                        Abrir Chamado 🚀
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleSidebar() { document.getElementById('app-sidebar').classList.toggle('-translate-x-full'); }
    </script>
</body>
</html>
