{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto my-8 p-6 bg-white rounded-xl shadow-sm border border-gray-200">
    <div class="flex justify-between items-center mb-6 pb-4 border-b border-gray-100">
        <div>
            <h2 class="text-xl font-bold text-gray-800">Editar Perfil do Cliente</h2>
            <p class="text-xs text-gray-500 mt-0.5">Modificando dados de: <span class="font-semibold text-gray-700">{{ cliente.nome_fantasia }}</span></p>
        </div>
        <a href="{% url 'comercial_clientes_lista' %}" class="text-gray-600 hover:text-gray-900 bg-gray-50 hover:bg-gray-100 px-4 py-2 rounded-lg text-xs font-semibold border border-gray-200 transition">
            &larr; Voltar para a Lista
        </a>
    </div>

    <form method="POST" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Nome Fantasia</label>
                <input type="text" name="nome_fantasia" value="{{ cliente.nome_fantasia|default_if_none:'' }}" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Razão Social</label>
                <input type="text" name="razao_social" value="{{ cliente.razao_social|default_if_none:'' }}" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">CNPJ ou CPF</label>
                <input type="text" name="cnpj_cpf" value="{{ cliente.cnpj_cpf|default_if_none:'' }}" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Tipo</label>
                <select name="tipo" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                    <option value="PJ" {% if cliente.tipo == 'PJ' %}selected{% endif %}>Pessoa Jurídica (PJ)</option>
                    <option value="PF" {% if cliente.tipo == 'PF' %}selected{% endif %}>Pessoa Física (PF)</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">E-mail</label>
                <input type="email" name="email" value="{{ cliente.email|default_if_none:'' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Telefone</label>
                <input type="text" name="telefone" value="{{ cliente.telefone|default_if_none:'' }}"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>

            <div class="md:col-span-2">
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Contato Responsável / Ponto de Contato</label>
                <input type="text" name="contato_responsavel" value="{{ cliente.contato_responsavel|default_if_none:'' }}"
                       placeholder="Ex: Rosângelo Sousa (Financeiro / TI)"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
            </div>
        </div>

        <div>
            <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Endereço Completo</label>
            <input type="text" name="endereco" value="{{ cliente.endereco|default_if_none:'' }}"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
        </div>

        <div class="p-4 bg-gray-50 rounded-xl border border-gray-200">
            <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-1">Ficha Cadastral (PDF ou Imagem)</label>
            
            {% if cliente.ficha_cadastral %}
                <div class="mb-3 text-xs text-gray-500 flex items-center gap-1.5 bg-blue-50/50 p-2 rounded-lg border border-blue-100 w-fit">
                    <span>📎 Arquivo atual:</span>
                    <a href="{{ cliente.ficha_cadastral.url }}" target="_blank" class="text-blue-600 hover:text-blue-800 font-bold underline flex items-center gap-0.5">
                        Visualizar Ficha Cadastral ↗
                    </a>
                </div>
            {% endif %}
            
            <input type="file" name="ficha_cadastral" accept="application/pdf,image/*"
                   class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition cursor-pointer">
        </div>

        <div class="flex justify-end gap-3 border-t border-gray-100 pt-4">
            <a href="{% url 'comercial_clientes_lista' %}" class="bg-white hover:bg-gray-50 text-gray-700 font-semibold px-5 py-2 text-sm rounded-lg border border-gray-200 transition">
                Cancelar
            </a>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 text-sm rounded-lg shadow-sm transition">
                Salvar Alterações
            </button>
        </div>
    </form>
</div>
{% endblock %}
