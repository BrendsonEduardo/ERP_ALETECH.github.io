<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALETECH - Novo Chamado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: bold; color: #25D366 !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid px-4">
            <span class="navbar-brand">SUPORTE TÉCNICO - ALETECH</span>
            <div class="d-flex align-items-center gap-3">
                <a href="{% url 'painel_helpdesk' %}" class="btn btn-outline-light btn-sm">⬅️ Voltar ao Painel</a>
                <span class="text-light fs-6">2026</span>
            </div>
        </div>
    </nav>

    <div class="container mb-5" style="max-width: 800px;">
        <div class="card shadow-sm p-4 bg-white rounded border-0">
            <h2 class="mb-4 fw-bold text-secondary">Abertura de Chamado</h2>
            
            <form action="{% url 'novo_chamado' %}" method="POST">
                {% csrf_token %}
                
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Empresa / Cliente:</label>
                        <input type="text" name="empresa" class="form-control" placeholder="Nome da empresa parceira" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Solicitante:</label>
                        <input type="text" name="solicitante" class="form-control" placeholder="Quem está pedindo o suporte?" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Contato (WhatsApp/Telefone):</label>
                        <input type="text" name="contato" class="form-control" placeholder="(00) 00000-0000" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Forma de Atendimento:</label>
                        <select name="forma_atendimento" class="form-select">
                            <option value="Presencial" selected>🚗 Presencial</option>
                            <option value="Remoto">💻 Remoto</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Equipamento / Ativo:</label>
                        <input type="text" name="equipamento" class="form-control" placeholder="Ex: Servidor, Notebook Dell, Impressora HP" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-bold">Grau de Prioridade:</label>
                        <select name="prioridade" class="form-select" required>
                            <option value="Baixa">🟢 Baixa</option>
                            <option value="Média" selected>🟡 Média</option>
                            <option value="Alta">🔴 Alta</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-bold">Descrição do Problema:</label>
                        <textarea name="problema" rows="4" class="form-control" placeholder="Detalhe o erro ou solicitação com o máximo de informações possível conforme diretriz do POP-001..." required></textarea>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="{% url 'painel_helpdesk' %}" class="btn btn-secondary px-4">Cancelar</a>
                    <button type="submit" class="btn btn-success px-4 fw-bold">Abrir Chamado 🚀</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
