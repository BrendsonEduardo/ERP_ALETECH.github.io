<!-- Kanban Card — Nubank Design -->
<div class="kanban-card" data-id="{{ op.id }}"
     style="background: #1E1E28; border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 14px; cursor: grab; transition: all 0.2s ease; margin-bottom: 8px;"
     onmouseover="this.style.borderColor='rgba(138,5,190,0.35)'; this.style.boxShadow='0 4px 20px rgba(0,0,0,0.3)';"
     onmouseout="this.style.borderColor='rgba(255,255,255,0.07)'; this.style.boxShadow='none';">

    <!-- Client name + detail link -->
    <div style="display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px;">
        <h4 style="font-size: 13px; font-weight: 700; color: #FAFAFA; margin: 0; line-height: 1.3; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"
            title="{{ op.cliente.nome_fantasia }}">
            {{ op.cliente.nome_fantasia }}
        </h4>
        <a href="{% url 'detalhe_proposta' op.id %}"
           style="flex-shrink: 0; width: 24px; height: 24px; border-radius: 6px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); display: inline-flex; align-items: center; justify-content: center; font-size: 12px; text-decoration: none; transition: all 0.15s;"
           title="Ver detalhes"
           onmouseover="this.style.background='rgba(138,5,190,0.2)'; this.style.borderColor='rgba(138,5,190,0.3)';"
           onmouseout="this.style.background='rgba(255,255,255,0.04)'; this.style.borderColor='rgba(255,255,255,0.07)';">
            👁
        </a>
    </div>

    <!-- Opportunity title -->
    <p style="font-size: 11px; color: #71717A; margin: 0 0 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"
       title="{{ op.titulo }}">
        {{ op.titulo }}
    </p>

    <!-- Test badge -->
    {% if op.teste %}
    <a href="{% url 'gerenciar_teste' op.id %}" style="text-decoration: none; display: inline-block; margin-bottom: 10px;">
        <span style="display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 800; color: #60A5FA; background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.2); padding: 3px 8px; border-radius: 99px; text-transform: uppercase; letter-spacing: 0.04em; animation: pulse-soft 2s ease-in-out infinite;"
              title="Gerenciar equipamentos em teste">
            🔬 Em Teste · {{ op.teste.dias_duracao }}d
        </span>
    </a>
    {% endif %}

    <!-- Footer: value + edit -->
    <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05);">
        <div style="display: flex; align-items: center; gap: 8px;">
            <span style="font-size: 13px; font-weight: 800; color: #34D399; letter-spacing: -0.3px;">
                R$&nbsp;{{ op.valor_estimado|floatformat:2 }}
            </span>
            <a href="{% url 'editar_proposta' op.id %}"
               style="width: 22px; height: 22px; border-radius: 5px; background: rgba(255,255,255,0.04); display: inline-flex; align-items: center; justify-content: center; font-size: 11px; text-decoration: none; transition: all 0.15s;"
               title="Editar"
               onmouseover="this.style.background='rgba(251,191,36,0.15)'"
               onmouseout="this.style.background='rgba(255,255,255,0.04)'">✏️</a>
        </div>

        <span style="font-size: 10px; font-weight: 700; color: #52525B; background: rgba(255,255,255,0.04); padding: 2px 7px; border-radius: 99px; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"
              title="Vendedor: {{ op.vendedor.username|default:'Não atribuído' }}">
            {{ op.vendedor.username|default:"—" }}
        </span>
    </div>
</div>

<style>
@keyframes pulse-soft {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.65; }
}
.kanban-card:active { cursor: grabbing; }
</style>
